  <!-- Wishlist Icon -->

  <!-- Cart Icon -->
  <a href="../htmlpages/cart.html">
    <i class="fa-solid fa-bag-shopping"></i>
  </a>
</div>

<!-- Categories Overlay -->
<div class="category-overlay" id="categoryOverlay">
  <div class="category-box">

<h4><a href="../htmlpages/productcatalogue.html?category=kurtis">Kurtis</a></h4>
<h4><a href="../htmlpages/productcatalogue.html?category=saree">Saree</a></h4>
<h4><a href="../htmlpages/productcatalogue.html?category=lehenga">Lehenga</a></h4>
<h4><a href="../htmlpages/productcatalogue.html?category=dress">Dress</a></h4>

  </div>
</div>

<!-- Profile Overlay -->
<div class="profile-overlay" id="profileOverlay">
  <div class="profile-box">
    <ul>
      <li><a href="../htmlpages/userprofile.html?section=orders">My Orders</a></li>
      <li><a href="../htmlpages/wishlist.html">My Wishlist</a></li>
      <li><a href="../htmlpages/userprofile.html?section=savedAddress">Saved Addresses</a></li>
    </ul>

    <hr>

    <ul>
      <li><a href="../htmlpages/userprofile.html?section=editProfile">Edit Profile</a></li>
      <li id="logoutBtn"><a href="../htmlpages/login.html">Logout</a></li>
    </ul>
  </div>
</div>


<div class="login-wrapper">

  <div class="login-box">
    <h2>Login Or Signup</h2>

    <div class="phone-input">
      <span class="country-code">+91</span>
      <input type="text" placeholder="Enter Mobile Number">
    </div>

  <div class="otp-section" id="otpSection" style="display: none;">

  <h2 id="otpHeading">Verify With OTP</h2>
  <p class="otp-subtitle" id="otpSubtitle">
    Sent to <span id="userNumber"></span>
  </p>

<div id="otpContainer">
  <div class="otp-inputs">
    <input type="text" maxlength="1">
    <input type="text" maxlength="1">
    <input type="text" maxlength="1">
    <input type="text" maxlength="1">
    <input type="text" maxlength="1">
  </div>
</div>

<p class="resend" id="resendWrapper">
  <span id="resendBtn" class="resend-link">Resend OTP</span>
  (<span id="timer">30</span> Sec)
</p>

  <button class="verify-btn" onclick="window.location.href='index.html'">
    Verify
  </button>

<p class="password-login">
  Log in Using <span id="passwordToggle" style="cursor:pointer; color:#6b2f1a;">Password</span> Instead
</p>

</div>

    <div class="terms">
      <input type="checkbox" id="terms">
      <label for="terms">
        I Accept That I Have Read & Understood Your
        <a href="#">Privacy Policy</a> And <a href="#">T&C</a>.
      </label>
    </div>

    <button class="login-btn" onclick="showOTP()">Continue</button>
  </div>

</div>
<script src="../jspages/login.js"></script>
<script src="../jspages/script.js"></script>
