<!-- Categories Overlay -->
<div class="category-overlay" id="categoryOverlay">
  <div class="category-box">

<h4><a href="../htmlpages/productcatalogue.html?category=kurtis">Kurtis</a></h4>

<!-- Profile Overlay -->
<div class="profile-overlay" id="profileOverlay">
  <div class="profile-box">
    <ul>
      <li><a href="../htmlpages/userprofile.html?section=orders">My Orders</a></li>
      <li><a href="../htmlpages/wishlist.html">My Wishlist</a></li>
      <li><a href="../htmlpages/userprofile.html?section=savedAddress">Saved Addresses</a></li>
    </ul>

    <hr>

    <ul>
      <li><a href="../htmlpages/userprofile.html?section=editProfile">Edit Profile</a></li>
      <li id="logoutBtn"><a href="../htmlpages/login.html">Logout</a></li>
    </ul>
  </div>
</div>



<div class="login-wrapper">
  <div class="login-box">

    <h2>Signup</h2>

    <form id="signupForm">

      <!-- Mobile Number -->
      <label class="input-label">Mobile Number</label>
      <div class="phone-input">
        <span class="country-code">+91</span>
        <input type="tel" id="mobile" placeholder="Enter mobile number" required>
      </div>

      <!-- Name -->
      <label class="input-label">Name</label>
      <input type="text" id="name" class="normal-input" placeholder="Enter Your Name" required>

      <!-- Email -->
      <label class="input-label">Email Id (For Backup)</label>
      <input type="email" id="email" class="normal-input" placeholder="Enter email">

      <!-- Password -->
      <label class="input-label">Create New Password</label>
      <input type="password" id="password" class="normal-input" placeholder="Create password" required>

      <!-- Confirm Password -->
      <label class="input-label">Verify Password</label>
      <input type="password" id="confirmPassword" class="normal-input" placeholder="Confirm password" required>

      <!-- Button -->
      <button type="submit" class="login-btn">Sign Up</button>

    </form>

  </div>
</div>

<script src="../jspages/script.js"></script>
<script src="../jspages/signup.js"></script>
</body>
</html>
